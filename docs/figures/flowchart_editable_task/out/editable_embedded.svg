  <g id="texts">
    <text id="title" x="56" y="58" font-family="Microsoft YaHei" font-size="44" font-weight="700" fill="#182230" text-anchor="start"><tspan x="56" dy="0">DTA 制度型开放条款编码与指标构建流程</tspan></text>
    <text id="subtitle" x="56" y="98" font-family="Microsoft YaHei" font-size="20" font-weight="400" fill="#667085" text-anchor="start"><tspan x="56" dy="0">当前正式口径：Stage 1 双模型识别与仲裁；Stage 2 双模型交叉验证与冲突仲裁</tspan></text>
    <text id="data-header-text" x="68" y="176" font-family="Microsoft YaHei" font-size="19" font-weight="700" fill="#182230" text-anchor="start"><tspan x="68" dy="0">01  数据准备</tspan></text>
    <text id="stage1-header-text" x="288" y="176" font-family="Microsoft YaHei" font-size="19" font-weight="700" fill="#182230" text-anchor="start"><tspan x="288" dy="0">02  Stage 1｜制度型开放识别</tspan></text>
    <text id="stage2-header-text" x="728" y="176" font-family="Microsoft YaHei" font-size="19" font-weight="700" fill="#182230" text-anchor="start"><tspan x="728" dy="0">03  Stage 2｜贸易/投资影响识别</tspan></text>
    <text id="output-header-text" x="1308" y="176" font-family="Microsoft YaHei" font-size="19" font-weight="700" fill="#182230" text-anchor="start"><tspan x="1308" dy="0">04  指标输出</tspan></text>
    <text id="raw-text" x="150" y="240.015" font-family="Microsoft YaHei" font-size="21" font-weight="600" fill="#182230" text-anchor="middle"><tspan x="150" dy="0">DTA 2.0</tspan><tspan x="150" dy="26.25">条款原始表</tspan></text>
    <text id="clean-text" x="150" y="367.8" font-family="Microsoft YaHei" font-size="20" font-weight="600" fill="#182230" text-anchor="middle"><tspan x="150" dy="0">条款清洗</tspan><tspan x="150" dy="25.0">唯一 ID 构造</tspan></text>
    <text id="matrix-text" x="150" y="502.3" font-family="Microsoft YaHei" font-size="20" font-weight="600" fill="#182230" text-anchor="middle"><tspan x="150" dy="0">协定—条款</tspan><tspan x="150" dy="25.0">矩阵</tspan></text>
    <text id="data-note" x="150" y="600" font-family="Microsoft YaHei" font-size="17" font-weight="400" fill="#667085" text-anchor="middle"><tspan x="150" dy="0">统一条款粒度</tspan><tspan x="150" dy="21.25">保留来源字段与文本</tspan></text>
    <text id="s1a-text" x="377" y="224.62" font-family="Microsoft YaHei" font-size="18" font-weight="600" fill="#182230" text-anchor="middle"><tspan x="377" dy="0">1A 双模型判定</tspan><tspan x="377" dy="22.5">制度型开放？</tspan><tspan x="377" dy="22.5">样本 1,071 条</tspan></text>
    <text id="s1a-review-text" x="590" y="225.53" font-family="Microsoft YaHei" font-size="17" font-weight="600" fill="#182230" text-anchor="middle"><tspan x="590" dy="0">比较与仲裁</tspan><tspan x="590" dy="21.25">冲突 103 条</tspan><tspan x="590" dy="21.25">冲突率 9.62%</tspan></text>
    <text id="non-inst-text" x="377" y="337.53" font-family="Microsoft YaHei" font-size="17" font-weight="600" fill="#182230" text-anchor="middle"><tspan x="377" dy="0">非制度型开放</tspan><tspan x="377" dy="21.25">307 条</tspan><tspan x="377" dy="21.25">→ not_applicable</tspan></text>
    <text id="inst-text" x="590" y="337.53" font-family="Microsoft YaHei" font-size="17" font-weight="600" fill="#182230" text-anchor="middle"><tspan x="590" dy="0">制度型开放</tspan><tspan x="590" dy="21.25">764 条</tspan><tspan x="590" dy="21.25">进入 Stage 1B / 2</tspan></text>
    <text id="s1b-text" x="377" y="458.905" font-family="Microsoft YaHei" font-size="17" font-weight="600" fill="#182230" text-anchor="middle"><tspan x="377" dy="0">1B 双模型判定</tspan><tspan x="377" dy="21.25">四类制度维度</tspan><tspan x="377" dy="21.25">规则·规制</tspan><tspan x="377" dy="21.25">管理·标准</tspan></text>
    <text id="s1b-review-text" x="590" y="460.44" font-family="Microsoft YaHei" font-size="16" font-weight="600" fill="#182230" text-anchor="middle"><tspan x="590" dy="0">比较与仲裁</tspan><tspan x="590" dy="20.0">冲突 109 条</tspan><tspan x="590" dy="20.0">分母：764</tspan><tspan x="590" dy="20.0">冲突率 14.27%</tspan></text>
    <text id="s1-final-text" x="480" y="624.87" font-family="Microsoft YaHei" font-size="18" font-weight="600" fill="#182230" text-anchor="middle"><tspan x="480" dy="0">Stage 1 最终结果</tspan><tspan x="480" dy="22.5">条款属性 + 制度维度</tspan></text>
    <text id="s2-sample-text" x="820" y="223.12" font-family="Microsoft YaHei" font-size="18" font-weight="600" fill="#182230" text-anchor="middle"><tspan x="820" dy="0">Stage 2 样本</tspan><tspan x="820" dy="22.5">制度型开放条款</tspan><tspan x="820" dy="22.5">764 条</tspan></text>
    <text id="model-a-text" x="820" y="353.44" font-family="Microsoft YaHei" font-size="16" font-weight="600" fill="#182230" text-anchor="middle"><tspan x="820" dy="0">模型 A 独立编码</tspan><tspan x="820" dy="20.0">mp / tr / both / none</tspan></text>
    <text id="model-b-text" x="820" y="493.44" font-family="Microsoft YaHei" font-size="16" font-weight="600" fill="#182230" text-anchor="middle"><tspan x="820" dy="0">模型 B 独立编码</tspan><tspan x="820" dy="20.0">mp / tr / both / none</tspan></text>
    <text id="compare-text" x="1027" y="418.53" font-family="Microsoft YaHei" font-size="17" font-weight="600" fill="#182230" text-anchor="middle"><tspan x="1027" dy="0">一致性比较</tspan><tspan x="1027" dy="21.25">仅按影响类型</tspan><tspan x="1027" dy="21.25">核验权重规则</tspan></text>
    <text id="consensus-text" x="1195" y="312.03" font-family="Microsoft YaHei" font-size="17" font-weight="600" fill="#182230" text-anchor="middle"><tspan x="1195" dy="0">一致样本</tspan><tspan x="1195" dy="21.25">直接接受</tspan><tspan x="1195" dy="21.25">682 条</tspan></text>
    <text id="conflict-text" x="1195" y="509.03" font-family="Microsoft YaHei" font-size="17" font-weight="600" fill="#182230" text-anchor="middle"><tspan x="1195" dy="0">冲突样本</tspan><tspan x="1195" dy="21.25">盲审/仲裁</tspan><tspan x="1195" dy="21.25">82 条</tspan></text>
    <text id="trace-text" x="820" y="630.35" font-family="Microsoft YaHei" font-size="15" font-weight="600" fill="#182230" text-anchor="middle"><tspan x="820" dy="0">可追溯记录</tspan><tspan x="820" dy="18.75">prompt / hash</tspan><tspan x="820" dy="18.75">run_id</tspan></text>
    <text id="s2-final-text" x="1070" y="625.155" font-family="Microsoft YaHei" font-size="17" font-weight="600" fill="#182230" text-anchor="middle"><tspan x="1070" dy="0">最终影响类型与权重</tspan><tspan x="1070" dy="21.25">贸易权重 / 投资权重</tspan></text>
    <text id="out-provision-text" x="1420" y="274.3" font-family="Microsoft YaHei" font-size="20" font-weight="600" fill="#182230" text-anchor="middle"><tspan x="1420" dy="0">条款层面</tspan><tspan x="1420" dy="25.0">贸易/投资权重</tspan></text>
    <text id="out-agreement-text" x="1420" y="425.3" font-family="Microsoft YaHei" font-size="20" font-weight="600" fill="#182230" text-anchor="middle"><tspan x="1420" dy="0">协定层面指数</tspan><tspan x="1420" dy="25.0">400 份协定</tspan></text>
    <text id="out-panel-text" x="1420" y="573.62" font-family="Microsoft YaHei" font-size="18" font-weight="600" fill="#182230" text-anchor="middle"><tspan x="1420" dy="0">国家对—年份面板</tspan><tspan x="1420" dy="22.5">指标 / 生效 dummy</tspan><tspan x="1420" dy="22.5">及理想点距离</tspan></text>
    <text id="output-note" x="1420" y="680" font-family="Microsoft YaHei" font-size="16" font-weight="400" fill="#667085" text-anchor="middle"><tspan x="1420" dy="0">最终全期表：1958—2023</tspan><tspan x="1420" dy="20.0">76 个经济体</tspan></text>
    <text id="legend-title" x="76" y="770" font-family="Microsoft YaHei" font-size="20" font-weight="700" fill="#182230" text-anchor="start"><tspan x="76" dy="0">影响类型与进入条件</tspan></text>
    <text id="legend-line-1" x="76" y="806" font-family="Microsoft YaHei" font-size="17" font-weight="400" fill="#182230" text-anchor="start"><tspan x="76" dy="0">mp：仅直接作用于贸易；tr：仅直接作用于跨境投资；both：两条渠道均存在，权重均大于 0 且合计为 1。</tspan></text>
    <text id="legend-line-2" x="76" y="836" font-family="Microsoft YaHei" font-size="17" font-weight="400" fill="#667085" text-anchor="start"><tspan x="76" dy="0">none：已进入 Stage 2，但无直接贸易/投资影响；not_applicable：Stage 1 判定为非制度型开放，未进入 Stage 2。</tspan></text>
  </g>
</svg>
